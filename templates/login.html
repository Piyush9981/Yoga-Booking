{% extends "base.html" %}

{% block content %}
<section class="login-section">
    <div class="login-form-div">
        <h1 class="login-heading">Login to Your Account</h1>
        <form>
            <label for="email">Email</label><br>
            <input type="email" name="login" id="email"><br>
            <label for="pass">Passwords</label><br>
            <input type="password" name="login" id="pass"> <br>
            <button type="submit" class="login-form-btn">Login</button>
        </form>
        <div class="forgot-pass-div">
            <a href="#" class="forgot-pass">Forgot Password?</a>
        </div>
        <div class="signup-redirecting-div">
            <p>Don't have an Account?<a href="signup" class="signup-redirecting">Sign Up</a></p>
        </div>
    </div>
</section>
{% endblock %}
